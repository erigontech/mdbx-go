version: "2"
run:
  tests: true
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - durationcheck
    - fatcontext
    - gochecksumtype
    - gosmopolitan
    - loggercheck
    - nilnesserr
    - prealloc
    - reassign
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - testifylint
    - unconvert
    - wastedassign
    - zerologlint
    - errorlint
    - noctx
    - nilerr
    - unused
    - makezero
    - perfsprint
    - gocritic
    - copyloopvar
    - intrange
    - misspell
    - nolintlint
    - predeclared
    - usestdlibvars
    - mirror
    - exptostd
    - dupword
    - gocheckcompilerdirectives
    - thelper
    - tparallel
    - nilnil
    - whitespace
    - sloglint
    - canonicalheader
    - iface
    - recvcheck
    - unparam
  disable:
    # errname would rename the long-established public Errno constants
    # (NotFound, KeyExist, ...) and the Errno type itself.
    - errname
    - contextcheck
    - err113
    - errchkjson
    - exhaustive
    - gosec
    - musttag
    - protogetter
    - wrapcheck
  settings:
    goconst:
      min-len: 3
      min-occurrences: 6
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - unparam
          - unused
        path: _test\.go
      - linters:
          - golint
        text: should be
      - linters:
          - err113
        text: do not define dynamic errors
      - linters:
          - staticcheck
        text: (should be|should have name of the form)
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
